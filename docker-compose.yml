services:
  mysql:
    image: mysql:8.0
    container_name: chatflow-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chatflow
      MYSQL_USER: chatflow
      MYSQL_PASSWORD: chatflow
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - chatflow-mysql-data:/var/lib/mysql

volumes:
  chatflow-mysql-data:
